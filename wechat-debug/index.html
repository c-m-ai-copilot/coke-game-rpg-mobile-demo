    <title>苍山侠影 · 微信小游戏调试</title>

      * { box-sizing: border-box; }

      canvas { width: min(100vw, 390px); height: min(100vh, 844px); aspect-ratio: 390 / 844; image-rendering: pixelated; background: #171510; touch-action: none; box-shadow: 0 0 0 1px #413827; }
      @media (max-width: 390px), (max-height: 844px) { canvas { width: 100vw; height: 100vh; } }
    </style>
  </head>

    <canvas id="game" aria-label="苍山侠影竖屏游戏画面"></canvas>
